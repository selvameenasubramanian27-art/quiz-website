<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Smart AI Quiz</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="center-wrapper">
    <div class="glass-card auth-card animate-fade-in">
      <div class="logo justify-center mb-3">
        <i class="fa-solid fa-brain"></i>
        <span>Smart AI Quiz</span>
      </div>
      
      <h2>Student Sign Up</h2>
      <p class="mb-4" style="color: var(--gray-light)">Create a student account to start quizzing</p>
      
      <div id="signup-alert" class="alert"></div>
      
      <form id="signup-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Create a strong password" required minlength="6">
        </div>
        
        <button type="submit" class="btn btn-primary mt-2">Sign Up</button>
      </form>
      
      <p class="mt-4 text-center">
        Already have an account? <a href="student-login.html">Login</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      auth.redirectIfAuthenticated();
      
      document.getElementById('signup-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        try {
          auth.signup(username, email, password, 'student'); // Default role is student
          // Auto login after signup
          auth.login(email, password);
          window.location.href = 'dashboard.html';
        } catch (error) {
          Utils.showAlert('signup-alert', error.message, 'danger');
        }
      });
    });
  </script>
</body>
</html>
