<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Smart AI Quiz</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
      margin-top: 2rem;
    }
    .question-list {
      max-height: 600px;
      overflow-y: auto;
      padding-right: 1rem;
    }
    /* Custom Scrollbar for list */
    .question-list::-webkit-scrollbar { width: 6px; }
    .question-list::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    
    .question-item {
      background: rgba(255, 255, 255, 0.05);
      border-left: 4px solid var(--gold);
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      position: relative;
    }
    .question-item h4 { margin-bottom: 0.25rem; font-size: 1rem; color: var(--white); }
    .question-item p { color: var(--gray-light); font-size: 0.8rem; margin-bottom: 0.5rem; }
    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
    }
    .badge.mcq { color: #66b3ff; }
    .badge.voice { color: #ff9966; }
    
    .q-actions {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    .btn-icon {
      background: none;
      border: none;
      color: var(--gray-light);
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-icon:hover.edit { color: var(--gold); }
    .btn-icon:hover.delete { color: var(--danger); }
    
    .mcq-fields, .voice-fields { display: none; }
    
    @media (max-width: 900px) {
      .admin-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="container animate-fade-in">
    <nav class="navbar glass-card">
      <div class="logo">
        <i class="fa-solid fa-user-shield"></i>
        <span>Admin Panel</span>
      </div>
      <div class="nav-links">
        <a href="leaderboard.html" class="user-badge" style="background: rgba(212, 175, 55, 0.2); color: var(--gold);">
          <i class="fa-solid fa-trophy"></i> Leaderboard
        </a>
        <div class="user-badge">
          <i class="fa-solid fa-user-tie"></i>
          <span id="user-info">Admin</span>
        </div>
        <a href="#" id="logout-btn"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
      </div>
    </nav>
    
    <div class="admin-grid">
      <!-- Form Section -->
      <div class="glass-card">
        <h2 id="form-title">Add New Question</h2>
        <div id="admin-alert" class="alert"></div>
        
        <form id="question-form">
          <input type="hidden" id="q-id">
          
          <div class="form-group">
            <label>Question Type</label>
            <select id="q-type" class="form-control" required onchange="toggleFields()">
              <option value="mcq">MCQ</option>
              <option value="voice">Voice</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Question Text</label>
            <textarea id="q-text" class="form-control" rows="3" required></textarea>
          </div>
          
          <div id="mcq-fields" class="mcq-fields">
            <div class="form-group">
              <label>Option A (0)</label>
              <input type="text" id="q-opt0" class="form-control">
            </div>
            <div class="form-group">
              <label>Option B (1)</label>
              <input type="text" id="q-opt1" class="form-control">
            </div>
            <div class="form-group">
              <label>Option C (2)</label>
              <input type="text" id="q-opt2" class="form-control">
            </div>
            <div class="form-group">
              <label>Option D (3)</label>
              <input type="text" id="q-opt3" class="form-control">
            </div>
            <div class="form-group">
              <label>Correct Answer (Index 0-3)</label>
              <select id="q-correct" class="form-control">
                <option value="0">Option A</option>
                <option value="1">Option B</option>
                <option value="2">Option C</option>
                <option value="3">Option D</option>
              </select>
            </div>
          </div>
          
          <div id="voice-fields" class="voice-fields">
            <div class="form-group">
              <label>Voice Answer Keyword (Lower case)</label>
              <input type="text" id="q-keyword" class="form-control" placeholder="e.g. javascript">
            </div>
          </div>
          
          <div class="mt-3">
             <button type="submit" class="btn btn-primary" id="save-btn">Save Question</button>
             <button type="button" class="btn btn-secondary mt-1" onclick="resetForm()">Cancel / Clear</button>
          </div>
        </form>
      </div>
      
      <!-- List Section -->
      <div class="glass-card">
        <div style="display: flex; justify-content: space-between; align-items: center;" class="mb-3">
          <h2>Questions Base</h2>
          <button class="btn btn-secondary" onclick="loadQuestions()" style="padding: 0.5rem 1rem; width: auto;"><i class="fa-solid fa-sync"></i></button>
        </div>
        <div class="question-list" id="q-list">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
