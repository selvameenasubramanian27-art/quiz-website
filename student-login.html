<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login - Smart AI Quiz</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="center-wrapper">
    <div class="glass-card auth-card animate-fade-in">
      <div class="logo justify-center mb-3">
        <i class="fa-solid fa-user-graduate"></i>
        <span>Smart AI Quiz</span>
      </div>
      
      <h2>Student Login</h2>
      <p class="mb-4" style="color: var(--gray-light)">Access your dashboard and start quizzing</p>
      
      <div id="login-alert" class="alert"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn btn-primary mt-2">Login</button>
      </form>
      
      <p class="mt-4 text-center">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>
      <p class="mt-2 text-center" style="font-size: 0.8rem; color: var(--gray-light)">
        <em>This portal is only for students.</em>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      auth.redirectIfAuthenticated();
      
      document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        try {
          const user = auth.login(email, password, 'student');
          window.location.href = 'dashboard.html';
        } catch (error) {
          Utils.showAlert('login-alert', error.message, 'danger');
        }
      });
    });
  </script>
</body>
</html>
