<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCQ Quiz - Smart AI Quiz</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .quiz-container { max-width: 800px; margin: 0 auto; }
    .progress-bar-container {
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width 0.3s ease;
    }
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .timer {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      background: rgba(255, 76, 76, 0.2);
      border: 1px solid var(--danger);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .timer.warning {
      animation: pulse 1s infinite alternate;
      color: var(--danger);
    }
    .question-block {
      background: rgba(255, 255, 255, 0.05);
      padding: 2rem;
      border-radius: var(--radius-md);
      margin-bottom: 2rem;
      min-height: 150px;
      display: flex;
      align-items: center;
      font-size: 1.25rem;
      line-height: 1.6;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    .option-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      padding: 1.25rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: var(--transition);
      font-size: 1.1rem;
    }
    .option-card:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--gold-dark); transform: translateX(5px); }
    .option-card.selected { background: rgba(212, 175, 55, 0.2); border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
    .option-card .tick {
      opacity: 0;
      color: var(--gold);
      font-size: 1.25rem;
      transform: scale(0);
      transition: var(--transition);
    }
    .option-card.selected .tick { opacity: 1; transform: scale(1); }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }
    .nav-buttons button { width: auto; min-width: 120px; }
    
    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }
  </style>
</head>
<body>

  <div class="container animate-fade-in quiz-container">
    <nav class="navbar glass-card" style="padding: 1rem; margin-bottom: 1.5rem;">
      <div class="logo">
        <i class="fa-solid fa-list-check"></i>
        <span>MCQ Quiz Mode</span>
      </div>
      <div>
        <button class="btn btn-secondary" style="padding: 0.5rem 1rem;" onclick="confirmExit()">Exit Quiz</button>
      </div>
    </nav>
    
    <div class="glass-card" id="quiz-area" style="display: none;">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      
      <div class="quiz-header">
        <h3 style="color: var(--gray-light); margin: 0;">Question <span id="q-current">1</span> of <span id="q-total">10</span></h3>
        <div class="timer" id="timer">
          <i class="fa-regular fa-clock"></i> <span id="time-left">30</span>s
        </div>
      </div>
      
      <div class="question-block" id="question-text">
        <!-- Question goes here -->
      </div>
      
      <div class="options-grid" id="options-grid">
        <!-- Options go here -->
      </div>
      
      <div class="nav-buttons">
        <button class="btn btn-secondary" id="btn-prev" onclick="prevQuestion()" disabled><i class="fa-solid fa-arrow-left"></i> Previous</button>
        <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()">Next <i class="fa-solid fa-arrow-right"></i></button>
      </div>
    </div>
    
    <div class="glass-card text-center" id="loading-area">
      <h2 class="mb-2"><i class="fa-solid fa-spinner fa-spin text-gold"></i> Preparing Quiz...</h2>
      <p style="color: var(--gray-light)">Loading questions from server.</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
