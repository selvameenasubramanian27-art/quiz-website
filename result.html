<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Result - Smart AI Quiz</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    .result-card {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      padding: 3rem 2rem;
    }
    .score-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: conic-gradient(var(--gold) var(--progress), rgba(255,255,255,0.1) 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem auto;
      position: relative;
    }
    .score-inner {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: var(--royal-blue);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-inner h2 {
      font-size: 3rem;
      margin: 0;
      color: var(--white);
    }
    .score-inner p {
      color: var(--gray-light);
      margin: 0;
      font-size: 0.9rem;
    }
    .stat-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 2rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-sm);
      padding: 1rem;
    }
    .stat-item h3 { margin-bottom: 0.25rem; font-size: 1.5rem; }
    .stat-item p { color: var(--gray-light); font-size: 0.9rem; }
    .correct-text { color: var(--success); }
    .wrong-text { color: var(--danger); }
    
    .message {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }
    .msg-excellent { color: var(--gold); }
    .msg-good { color: var(--white); }
    .msg-poor { color: var(--danger); }
  </style>
</head>
<body>

  <div class="center-wrapper animate-fade-in">
    <div class="glass-card result-card">
      <h1 class="mb-3">Quiz Completed!</h1>
      
      <div class="score-circle" id="score-circle" style="--progress: 0%">
        <div class="score-inner">
          <h2 id="score-percent">0%</h2>
          <p>Score</p>
        </div>
      </div>
      
      <div id="performance-msg" class="message"></div>
      
      <div class="stat-row">
        <div class="stat-item">
          <h3 id="stat-total">0</h3>
          <p>Total Questions</p>
        </div>
        <div class="stat-item">
          <h3 id="stat-correct" class="correct-text">0</h3>
          <p>Correct</p>
        </div>
        <div class="stat-item">
          <h3 id="stat-wrong" class="wrong-text">0</h3>
          <p>Wrong</p>
        </div>
      </div>
      
      <div style="display: flex; gap: 1rem; justify-content: center;">
        <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
        <button class="btn btn-primary" onclick="window.location.href='leaderboard.html'">View Leaderboard</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      auth.requireAuth(['student', 'admin']);
      
      const resultData = JSON.parse(sessionStorage.getItem('last_quiz_result'));
      
      if (!resultData) {
        window.location.href = 'dashboard.html';
        return;
      }
      
      // Animate progress circle
      setTimeout(() => {
        document.getElementById('score-circle').style.setProperty('--progress', `${resultData.percentage}%`);
      }, 100);
      
      // Populate fields
      document.getElementById('score-percent').textContent = `${resultData.percentage}%`;
      document.getElementById('stat-total').textContent = resultData.total;
      document.getElementById('stat-correct').textContent = resultData.correct;
      document.getElementById('stat-wrong').textContent = resultData.wrong;
      
      // Messages and Confetti
      const msgEl = document.getElementById('performance-msg');
      if (resultData.percentage >= 80) {
        msgEl.textContent = "Excellent Performance! 🌟";
        msgEl.className = "message msg-excellent";
        fireConfetti();
        playCompletionSound(true);
      } else if (resultData.percentage >= 50) {
        msgEl.textContent = "Good Job! 👍 Keep practicing.";
        msgEl.className = "message msg-good";
        playCompletionSound(false);
      } else {
        msgEl.textContent = "Try Again! 📚 You can do better.";
        msgEl.className = "message msg-poor";
        playCompletionSound(false);
      }
    });
    
    function fireConfetti() {
      var duration = 3 * 1000;
      var animationEnd = Date.now() + duration;
      var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
          return clearInterval(interval);
        }

        var particleCount = 50 * (timeLeft / duration);
        confetti(Object.assign({}, defaults, { particleCount,
          origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
        }));
        confetti(Object.assign({}, defaults, { particleCount,
          origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
        }));
      }, 250);
    }
    
    function playCompletionSound(isExcellent) {
      if(!window.AudioContext && !window.webkitAudioContext) return;
      
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      
      osc.connect(gain);
      gain.connect(ctx.destination);
      
      if (isExcellent) {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, ctx.currentTime);
        osc.frequency.setValueAtTime(600, ctx.currentTime + 0.2);
        osc.frequency.setValueAtTime(800, ctx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
        osc.start();
        osc.stop(ctx.currentTime + 1);
      } else {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.setValueAtTime(400, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
        osc.start();
        osc.stop(ctx.currentTime + 0.8);
      }
    }
  </script>
</body>
</html>
